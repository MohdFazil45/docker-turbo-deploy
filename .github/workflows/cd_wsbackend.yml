name: Continous Deployment WSBackend
on: 
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v2

      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN}}

          
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile.wsBackend
          push: true
          tags: fazil846/deploy-turbo-wsbackend:${{ github.sha }}
      - name: Deploy to the VM
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" &> ~/ssh_key
          chmod 700 /home/runner/ssh_key
          ssh -o StrictHostKeyChecking=no -i ~/ssh_key ubuntu@65.2.178.93 -t "docker pull fazil846/deploy-turbo-wsbackend:${{ github.sha }} && docker stop user_wsbackend || true &&
            docker rm user_wsbackend || true  && docker run --name user_wsbackend -d -p 8080:8080  fazil846/deploy-turbo-wsbackend:${{ github.sha }}"
 

